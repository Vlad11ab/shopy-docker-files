services:
  mysql-db:
    image: mysql:8.4
    container_name: shopy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: online_shop_cloud_db
    ports:
      - "3500:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  shopy:
    image: vlad11ab/shopy-api:schooly-api-260611-1740
    container_name: shopy-api
    environment:
      DB_URL: jdbc:mysql://mysql-db:3306/online_shop_cloud_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
    ports:
      - "8083:8081"
    restart: unless-stopped
    depends_on:
      mysql-db:
        condition: service_healthy

volumes:
  mysql_data: